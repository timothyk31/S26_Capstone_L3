[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (moderate speed, mock external deps)
    api: External API tests (slow, requires real APIs or contract testing)
    slow: Slow-running tests (> 5 seconds)
    requires_ssh: Tests requiring SSH access to remote systems
    requires_llm: Tests requiring LLM API access
    contract: API contract validation tests
    chaos: Chaos engineering and resilience tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning